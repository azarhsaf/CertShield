<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CertShield</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
<nav class="navbar navbar-expand-lg app-nav">
  <div class="container-fluid px-4">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
      <span class="brand-dot"></span>
      <span>CertShield</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="/cas">CAs</a></li>
        <li class="nav-item"><a class="nav-link" href="/templates">Templates</a></li>
        <li class="nav-item"><a class="nav-link" href="/findings">Findings</a></li>
        <li class="nav-item"><a class="nav-link" href="/certificates">Certificates</a></li>
        <li class="nav-item"><a class="nav-link" href="/history">History</a></li>
        <li class="nav-item"><a class="nav-link" href="/settings">Settings</a></li>
      </ul>
      {% if current_user %}
      <div class="d-flex align-items-center gap-3">
        <span class="text-light small">Signed in as <strong>{{ current_user }}</strong></span>
        <a class="btn btn-sm btn-outline-light" href="/logout">Logout</a>
      </div>
      {% endif %}
    </div>
  </div>
</nav>

<main class="container py-4">
  {% block content %}{% endblock %}
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
