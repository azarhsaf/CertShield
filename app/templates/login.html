<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CertShield Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="login-body">
<div class="login-shell">
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="brand-badge">CS</div>
      <h1 class="h4 mt-3 mb-1">CertShield</h1>
      <p class="text-secondary mb-0">Defensive ADCS Security Assessment & Visibility</p>
    </div>
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input class="form-control form-control-lg" name="username" required autocomplete="username">
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" class="form-control form-control-lg" name="password" required autocomplete="current-password">
      </div>
      <button class="btn btn-primary w-100 btn-lg">Sign in</button>
    </form>
  </div>
</div>
</body>
</html>
