{% extends 'base.html' %}{% block content %}<h3>Scan History</h3><table class="table"><tr><th>ID</th><th>Domain</th><th>Completed</th><th>Findings</th><th>Report</th></tr>{% for s in scans %}<tr><td>{{s.id}}</td><td>{{s.domain_name}}</td><td>{{s.completed_at}}</td><td>{{s.summary_json.findings}}</td><td><a href="/reports/{{s.id}}">HTML</a> | <a href="/reports/{{s.id}}.json">JSON</a></td></tr>{% endfor %}</table>{% endblock %}
